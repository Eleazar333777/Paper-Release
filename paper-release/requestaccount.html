<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cetara - Register</title>

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="images/cetara.ico" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-blue: #0066ff;
            --secondary-blue: #0052cc;
            --accent-cyan: #00d4ff;
            --dark-bg: #0a0e1a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-primary: #ffffff;
            --text-secondary: #b0c4de;
            --gradient-primary: linear-gradient(135deg, #0066ff 0%, #00d4ff 100%);
            --gradient-hero: linear-gradient(135deg, #0a0e1a 0%, #1a237e 50%, #0066ff 100%);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.1);
            --shadow-strong: 0 20px 60px rgba(0, 0, 0, 0.15);
            --border-radius: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            overflow-x: hidden;
            line-height: 1.6;
            min-height: 100vh;
            position: relative;
            padding: 0;
            margin: 0;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.1; }
            50% { transform: translateY(-100px) rotate(180deg); opacity: 0.3; }
        }

        /* Main Layout */
        .layout-container {
            padding-top: 80px;
            min-height: 100vh;
        }

        main {
            min-height: calc(100vh - 80px);
            display: flex;
            flex-direction: column;
        }

        /* Hero Section */
        #heroSection {
            padding: 2rem 0;
            text-align: center;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 2rem;
        }

        #heroSection h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 800;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }

        #heroSection p {
            font-size: 1.2rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto;
        }

        /* Register Container */
        .register-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .card-style {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            padding: 0;
            position: relative;
            overflow: hidden;
            width: 100%;
            max-width: 500px;
        }

        .card-style::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient-primary);
            border-radius: 30px 30px 0 0;
        }

        .form-wrapper {
            padding: 3rem;
        }

        .form-section h2 {
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
            font-size: 2rem;
            margin-bottom: 2rem;
            text-align: center;
            position: relative;
        }

        .form-section h2::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: var(--gradient-primary);
            border-radius: 2px;
        }

        /* Form Styling */
        .form-label {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.8rem;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: block;
        }

        .form-control {
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 1rem 1.2rem;
            font-weight: 500;
            transition: var(--transition);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            backdrop-filter: blur(10px);
            font-size: 1rem;
            margin-bottom: 1.5rem;
        }

        .form-control:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 0.2rem rgba(0, 212, 255, 0.25);
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.08);
            outline: none;
        }

        .form-control::placeholder {
            color: var(--text-secondary);
            font-style: italic;
        }

        .mb-3 {
            margin-bottom: 1.5rem;
        }

        /* Button Styling */
        .btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 15px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            cursor: pointer;
            text-decoration: none;
            font-size: 1rem;
            width: 100%;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: white;
        }

        .text-center {
            text-align: center;
        }

        /* Enhanced Dark Mode */
        .dark-mode {
            --text-primary: #0a0e1a;
            --text-secondary: #374151;
            --card-bg: rgba(255, 255, 255, 0.95);
            --gradient-primary: linear-gradient(135deg, #0ea5e9 0%, #1e40af 100%);
        }

        .dark-mode body {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            color: var(--text-primary);
        }

        .dark-mode .bg-animation {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }

        .dark-mode .bg-animation::before {
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grid" width="10" height="10" patternUnits="userSpaceOnUse"><path d="M 10 0 L 0 0 0 10" fill="none" stroke="rgba(0,0,0,0.03)" stroke-width="0.5"/></pattern></defs><rect width="100" height="100" fill="url(%23grid)"/></svg>');
        }

        .dark-mode .navbar {
            background: rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .dark-mode #heroSection {
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .dark-mode .card-style {
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(0, 0, 0, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .dark-mode .form-control {
            background: rgba(255, 255, 255, 0.9);
            color: var(--text-primary);
            border-color: rgba(0, 0, 0, 0.1);
        }

        .dark-mode .form-control:focus {
            background: rgba(255, 255, 255, 1);
            border-color: #0ea5e9;
            box-shadow: 0 0 0 0.2rem rgba(14, 165, 233, 0.25);
        }

        .dark-mode #darkModeToggle {
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid rgba(0, 0, 0, 0.1);
            color: var(--text-primary);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .layout-container {
                padding-top: 70px;
            }

            #heroSection {
                padding: 1.5rem 1rem;
            }

            .register-container {
                padding: 1rem;
            }

            .form-wrapper {
                padding: 2rem 1.5rem;
            }

            .form-section h2 {
                font-size: 1.8rem;
            }

            #darkModeToggle {
                bottom: 1rem;
                right: 1rem;
                width: 3rem;
                height: 3rem;
            }
        }

        @media (max-width: 480px) {
            .form-wrapper {
                padding: 1.5rem 1rem;
            }

            .form-section h2 {
                font-size: 1.6rem;
            }
        }

        /* Loading Animation */
        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-style {
            animation: slideInUp 0.6s ease-out;
        }

        #heroSection {
            animation: slideInUp 0.6s ease-out 0.1s both;
        }
    </style>
</head>

<body class="layout-container">
      <div w3-include-html="parts/background.html"></div>
    <div w3-include-html="parts/navbar.html"></div>

    <main>
        <!-- Hero Section -->
        <div id="heroSection">
            <section class="text-center px-5 pt-4 pb-1">
                <h1 class="display-5">Clean Water. Transparent Data.</h1>
                <p class="lead">Explore the latest in PFAS removal research</p>
            </section>
        </div>

        <!-- Form Section -->
        <div class="register-container">
            <div class="card-style">
                <section class="form-wrapper">
                    <div class="form-section">
                        <h2>Register an Account</h2>
                        <form id="registerForm">
                            <div class="mb-3">
                                <label for="firstName" class="form-label">First Name *</label>
                                <input type="text" class="form-control" id="firstName" required />
                            </div>
                            <div class="mb-3">
                                <label for="lastName" class="form-label">Last Name *</label>
                                <input type="text" class="form-control" id="lastName" required />
                            </div>
                            <div class="mb-3">
                                <label for="username" class="form-label">Username *</label>
                                <input type="text" class="form-control" id="username" required />
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">Email *</label>
                                <input type="email" class="form-control" id="email" required />
                            </div>
                            <div class="mb-3">
                                <label for="phone" class="form-label">Phone Number *</label>
                                <input type="tel" class="form-control" id="phone" required />
                            </div>
                            <div class="mb-3">
                                <label for="institution" class="form-label">Institution (optional)</label>
                                <input type="text" class="form-control" id="institution" />
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Password *</label>
                                <input type="password" class="form-control" id="password" required />
                            </div>
                            <div class="text-center">
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-person-plus me-2"></i>Register!
                                </button>
                            </div>
                        </form>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <script>
        // Your existing registration form logic would go here
        // Example placeholder:
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // Add your registration logic here
            console.log('Registration form submitted');
        });
    </script>

    <!-- Include your existing scripts -->
    <script src="js/script.js"></script>

    <!-- Footer -->
    <div w3-include-html="parts/footer.html"></div>
    <script src="js/include_html.js"></script>
    <script>
      includeHTML(() => {
        if (typeof updateNavbarLinks === 'function') {
          updateNavbarLinks();
        } 
        if (typeof createParticles === 'function') {
          createParticles(); 
        }
      });
    </script>
    <script src="js/navbarscript.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>


</body>
</html>
