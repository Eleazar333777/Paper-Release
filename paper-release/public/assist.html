<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cetara - CetaraGPT</title>

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="https://github.com/MSan789/Cetara/raw/23dd47fc225c284ed36c0eb1fa87aa61765c2da2/cetara.ico" />

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Bootstrap CSS (for navbar) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">

  <!-- Marked (Markdown renderer) -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    :root {
      --primary-blue: #0066ff;
      --secondary-blue: #0052cc;
      --accent-cyan: #00d4ff;
      --dark-bg: #0a0e1a;
      --card-bg: rgba(255, 255, 255, 0.05);
      --text-primary: #ffffff;
      --text-secondary: #b0c4de;
      --input-bg: rgba(20, 40, 100, 0.5);
      --input-border: rgba(59, 130, 246, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0a0e1a 0%, #1a237e 50%, #0066ff 100%) !important;
      background-attachment: fixed !important;
      color: var(--text-primary);
      padding-top: 70px;
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Ensure background shows */
    #background-canvas {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100% !important;
      height: 100% !important;
      z-index: -1 !important;
      pointer-events: none !important;
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--accent-cyan);
      border-radius: 999px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
    }

    /* Main container */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Main chat area */
    .main-chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Messages area */
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 2rem;
      padding-bottom: 2rem;
    }

    .message-row {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      align-items: flex-start;
    }

    /* User messages on the right */
    .message-row.user {
      flex-direction: row-reverse;
    }

    .message-avatar {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      padding: 4px;
    }

    .message-avatar img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .message-avatar.user {
      background: var(--primary-blue);
      color: white;
      font-size: 1.25rem;
      padding: 0;
    }

    .message-avatar.assistant {
      background: rgba(255, 255, 255, 0.1);
    }

    .message-bubble {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 1.25rem 1.5rem;
      max-width: 70%;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
    }

    /* User message bubble styling */
    .message-row.user .message-bubble {
      background: rgba(0, 102, 255, 0.2);
      border: 1px solid rgba(0, 102, 255, 0.3);
    }

    .message-content {
      color: var(--text-primary);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    /* Markdown styling */
    .chat-markdown p {
      margin: 0.5rem 0;
    }

    .chat-markdown code {
      font-family: 'Courier New', monospace;
      background: rgba(0, 212, 255, 0.1);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      color: var(--accent-cyan);
    }

    .chat-markdown pre {
      background: rgba(0, 0, 0, 0.3);
      padding: 1rem;
      border-radius: 8px;
      overflow: auto;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .chat-markdown pre code {
      background: transparent;
      padding: 0;
    }

    .chat-markdown table {
      border-collapse: collapse;
      width: 100%;
      margin: 1rem 0;
    }

    .chat-markdown th, .chat-markdown td {
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 0.5rem 0.75rem;
    }

    .chat-markdown th {
      background: rgba(0, 102, 255, 0.2);
      font-weight: 600;
    }

    /* Input area - positioned above footer */
    .input-area {
      padding: 1.5rem 2rem;
      background: transparent;
      z-index: 500;
    }

    .input-container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .input-wrapper {
      background: var(--input-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--input-border);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 102, 255, 0.2);
      transition: all 0.3s ease;
    }

    .input-wrapper:focus-within {
      border-color: rgba(0, 102, 255, 0.5);
      box-shadow: 0 12px 40px rgba(0, 102, 255, 0.3);
    }

    .input-main {
      display: flex;
      align-items: center;
      padding: 0.75rem 1rem 0.75rem 1.75rem;
      gap: 1rem;
    }

    .chat-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 0.5rem 0;
      color: var(--text-primary);
      font-size: 0.95rem;
      font-family: 'Poppins', sans-serif;
      resize: none;
      max-height: 150px;
      line-height: 1.5;
    }

    .chat-input::placeholder {
      color: rgba(176, 196, 222, 0.5);
    }

    .send-btn {
      background: var(--primary-blue);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 0.75rem 2rem;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s ease;
      flex-shrink: 0;
    }

    .send-btn:hover {
      background: #0052ff;
      transform: scale(1.02);
      box-shadow: 0 6px 20px rgba(0, 102, 255, 0.4);
    }

    .send-btn:active {
      transform: scale(0.98);
    }

    .input-footer {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 0.5rem 1.75rem 0.75rem 1.75rem;
    }

    .input-hint {
      font-size: 0.75rem;
      color: rgba(176, 196, 222, 0.6);
    }

    /* Footer at the very bottom */
    .footer-wrapper {
      margin-top: auto;
    }

    /* Responsive */
    @media (max-width: 768px) {
      body {
        padding-top: 60px;
      }

      .messages-area {
        padding: 1rem;
      }

      .message-bubble {
        max-width: 85%;
      }

      .input-area {
        padding: 1rem;
      }

      .input-main {
        padding: 0.5rem 0.75rem 0.5rem 1.25rem;
      }

      .send-btn {
        padding: 0.75rem 1.5rem;
        font-size: 0.85rem;
      }

      .input-footer {
        padding: 0.5rem 1.25rem 0.75rem 1.25rem;
      }
    }
  </style>
</head>
<body>

  <!-- Include Background -->
  <div w3-include-html="parts/background.html"></div>

  <!-- Include Navbar -->
  <div w3-include-html="parts/navbar.html"></div>

  <div class="chat-container">
    <!-- Main Chat -->
    <main class="main-chat">
      <!-- Messages -->
      <section id="messages" class="messages-area">
      </section>
    </main>

    <!-- Input (Above footer) -->
    <div class="input-area">
      <div class="input-container">
        <div class="input-wrapper">
          <div class="input-main">
            <textarea
              id="input"
              class="chat-input"
              rows="1"
              placeholder="Recommend the membrane for PFBA removal"
            ></textarea>
            <button id="sendBtn" class="send-btn">Send</button>
          </div>
          <div class="input-footer">
            <div id="hint" class="input-hint">Press Enter to send • Shift+Enter for newline</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Include Footer (Stuck to bottom) -->
  <div class="footer-wrapper" w3-include-html="parts/footer.html"></div>

  <script>
    // ==== DOM ====
    const $messages = document.getElementById('messages');
    const $input    = document.getElementById('input');
    const $send     = document.getElementById('sendBtn');

    // ==== API base ====
    const API_BASE = "";

    // ==== State ====
    let currentChat = { id: Date.now().toString(), messages: [], convoId: null, modelUsed: null };

    // ==== Utils ====
    function md(s) { return window.marked.parse(s || ''); }

    // Auto-resize textarea
    $input.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 150) + 'px';
    });

    // ==== UI helpers ====
    function appendBubble(role, html) {
      const row = document.createElement('div');
      row.className = `message-row ${role}`;

      const avatar = document.createElement('div');
      avatar.className = `message-avatar ${role}`;

      if (role === 'assistant') {
        const img = document.createElement('img');
        img.src = 'images/cetara.ico';
        img.alt = 'Assistant';
        avatar.appendChild(img);
      } else {
        // User avatar - person emoji
        avatar.textContent = '👤';
      }

      const bubble = document.createElement('div');
      bubble.className = 'message-bubble';

      const content = document.createElement('div');
      content.className = 'message-content chat-markdown';
      content.innerHTML = html;

      bubble.appendChild(content);
      row.appendChild(avatar);
      row.appendChild(bubble);
      $messages.appendChild(row);
      $messages.scrollTop = $messages.scrollHeight;
    }

    // ==== AI helpers ====
    async function ensureConvo() {
      if (currentChat.convoId) return currentChat.convoId;
      const res = await fetch(`${API_BASE}/api/openai-chat/start`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: 'gpt-5' })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Failed to start conversation');
      currentChat.convoId = data.convoId;
      currentChat.modelUsed = data.modelUsed || 'gpt-5';
      return currentChat.convoId;
    }

    async function send() {
      const q = $input.value.trim();
      if (!q) return;

      $input.value = '';
      $input.style.height = 'auto';

      const userHtml = md(q);
      currentChat.messages.push({ role: 'user', html: userHtml });
      appendBubble('user', userHtml);

      try {
        await ensureConvo();

        const thinkingDiv = document.createElement('div');
        thinkingDiv.className = 'chat-markdown';
        thinkingDiv.innerHTML = md('_Thinking…_');

        const row = document.createElement('div');
        row.className = 'message-row assistant';
        const avatar = document.createElement('div');
        avatar.className = 'message-avatar assistant';
        const img = document.createElement('img');
        img.src = 'images/cetara.ico';
        img.alt = 'Assistant';
        avatar.appendChild(img);
        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        const content = document.createElement('div');
        content.className = 'message-content chat-markdown';
        content.appendChild(thinkingDiv);
        bubble.appendChild(content);
        row.appendChild(avatar);
        row.appendChild(bubble);
        $messages.appendChild(row);
        $messages.scrollTop = $messages.scrollHeight;

        const url = `${API_BASE}/api/openai-chat/ask-sse?` +
          `convoId=${encodeURIComponent(currentChat.convoId)}&` +
          `q=${encodeURIComponent(q)}`;

        const es = new EventSource(url);

        es.addEventListener('status', (ev) => {
          try {
            const { message } = JSON.parse(ev.data || '{}');
            if (message) {
              thinkingDiv.innerHTML = md(`_${message}_`);
            }
          } catch { }
        });

        es.addEventListener('final', (ev) => {
          try {
            const data = JSON.parse(ev.data || '{}');
            if (data.error) {
              thinkingDiv.innerHTML = md(`🚨 ${data.error}`);
            } else {
              const ahtml = md(data.answer || '');
              currentChat.messages.push({ role: 'assistant', html: ahtml });
              thinkingDiv.innerHTML = ahtml;
            }
          } catch {
            thinkingDiv.innerHTML = md('🚨 Failed to parse response.');
          }
        });

        es.addEventListener('done', () => {
          es.close();
        });

        es.onerror = () => {
          es.close();
          thinkingDiv.innerHTML = md('🚨 Connection error.');
        };

      } catch (e) {
        const err = md('🚨 Error contacting AI server.');
        currentChat.messages.push({ role: 'assistant', html: err });
        appendBubble('assistant', err);
        console.error(e);
      }
    }

    // ==== Events ====
    $send.addEventListener('click', send);
    $input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    // ==== Init ====
    // Show welcome message on load
    window.addEventListener('DOMContentLoaded', () => {
      const welcomeMsg = md('Hi! I\'m your PFAS research assistant. Ask me anything about membranes, PFAS compounds, removal rates, or any data in our database.');
      appendBubble('assistant', welcomeMsg);
    });
  </script>

  <!-- Include HTML parts script -->
  <script src="js/include_html.js"></script>
  <script src="js/navbarscript.js"></script>
  <script>
    includeHTML(() => {
      console.log('HTML includes loaded');
      if (typeof updateNavbarLinks === 'function') {
        updateNavbarLinks();
      }
      if (typeof createParticles === 'function') {
        createParticles();
      }
    });
  </script>

  <!-- Bootstrap JS (for navbar dropdowns) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>

</body>
</html>
